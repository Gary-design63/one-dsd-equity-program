[build]
  command   = "npm run build"
  publish   = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA — redirect all routes to index.html
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[context.production.environment]
  VITE_SUPABASE_URL        = ""   # set in Netlify dashboard → Environment variables
  VITE_SUPABASE_ANON_KEY   = ""
  VITE_ANTHROPIC_API_KEY   = ""
