name: Deploy to Azure
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build API
        run: |
          cd apps/api
          npm install
      - name: Start API
        run: |
          node apps/api/index.js &
      - name: Smoke test
        run: |
          sleep 5
          node apps/api/smoke.js